<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แผนการดำเนินการจัดจ้างพนักงานรักษาความปลอดภัย</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7fa;
      padding: 20px;
      color: #333;
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    .gantt-container {
      overflow-x: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }
    .gantt-wrapper {
      min-width: 1400px;
    }
    .gantt-header {
      display: grid;
      grid-template-columns: 320px repeat(30, 1fr);
      background: #eef2f5;
      border: 1px solid #ddd;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }
    .date-cell {
      border-left: 1px solid #ddd;
      text-align: center;
      font-size: 12px;
      padding: 12px 0;
      color: #555;
      font-weight: bold;
    }
    .gantt-body {
      position: relative;
      border: 1px solid #ddd;
      border-top: none;
      background: #fff;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 320px repeat(30, 1fr);
      grid-template-rows: 1fr;
      pointer-events: none;
    }
    .grid-line {
      border-left: 1px solid #f0f0f0;
      grid-row: 1;
    }
    .task-row {
      display: grid;
      grid-template-columns: 320px repeat(30, 1fr);
      border-bottom: 1px solid #f0f0f0;
      height: 45px;
      align-items: center;
      position: relative;
    }
    .task-row:last-child {
      border-bottom: none;
    }
    .task-name-container {
      padding: 0 15px;
      display: flex;
      align-items: center;
      border-right: 1px solid #ddd;
      height: 100%;
      background: #fff;
      z-index: 1;
    }
    
    .status-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 10px;
      font-size: 14px;
      flex-shrink: 0;
    }
    .status-done {
      background-color: #e8f8f5;
      color: #2ecc71;
      border: 1px solid #2ecc71;
    }
    .status-pending {
      background-color: #fdedec;
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }
    
    .task-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .text-done { color: #2ecc71; }
    .text-pending { color: #e74c3c; }

    .task-bar {
      height: 28px;
      border-radius: 6px;
      z-index: 2;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      color: white;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
      margin: 0 2px;
    }
    .phase1 { background: #3498db; }
    .phase2 { background: #2ecc71; }

    .today-line-container {
      position: relative;
      grid-row: 1;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .today-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #e74c3c;
      box-shadow: 0 0 8px rgba(231, 76, 60, 0.8);
      transform: translateX(-50%);
    }
    .today-label {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: #e74c3c;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 2px 4px rgba(231, 76, 60, 0.4);
    }

    @keyframes blink-effect {
      0% { opacity: 1; box-shadow: 0 0 12px #f1c40f; }
      50% { opacity: 0.5; box-shadow: none; }
      100% { opacity: 1; box-shadow: 0 0 12px #f1c40f; }
    }
    .blink {
      animation: blink-effect 1.5s infinite;
      background: #f39c12 !important;
    }
  </style>
</head>
<body>

  <h2>แผนการดำเนินการจัดจ้างพนักงานรักษาความปลอดภัย (เริ่ม 2 เม.ย. 2569)</h2>
  <div class="gantt-container">
    <div class="gantt-wrapper">
      <div id="gantt-header" class="gantt-header"></div>
      <div class="gantt-body">
        <div id="grid-lines" class="grid-lines"></div>
        <div id="task-container"></div>
      </div>
    </div>
  </div>

  <script>
 // นำ URL ของคุณมาใส่ตรงนี้
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyF7fPA6XLVZzlTgnZJrQZpPFUOO_XeiuptZWrBadAfXitaH4a7_gCXCGZ-TNvyCM_5/exec';

  const startDate = new Date(2026, 3, 2); 
  const totalDays = 40; // ขยายจำนวนวันรองรับงานที่ยาวขึ้น
  const monthsThai = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

  async function loadGanttData() {
    try {
      document.getElementById('task-container').innerHTML = '<div style="padding: 20px; text-align: center;">กำลังซิงค์ข้อมูล...</div>';

      const response = await fetch(WEB_APP_URL);
      const tasks = await response.json(); // ข้อมูลมาเป็น Array ของขั้นตอนจาก Sheet เลย

      if (tasks.length === 0) {
        document.getElementById('task-container').innerHTML = '<div style="padding: 20px; text-align: center;">ไม่พบข้อมูลใน Sheet</div>';
        return;
      }

      renderGantt(tasks);

    } catch (error) {
      console.error('Error:', error);
      document.getElementById('task-container').innerHTML = '<div style="padding: 20px; text-align: center; color: red;">ไม่สามารถเชื่อมต่อข้อมูลได้</div>';
    }
  }

  function renderGantt(tasks) {
    // ใช้ฟังก์ชันวาดกราฟเดิมที่คุณมีอยู่ 
    // โดยโค้ดจะวนลูปตามจำนวน tasks ที่ดึงมาจาก Sheet โดยอัตโนมัติ
    let headerHTML = '<div class="task-name-container" style="background: transparent; border: none; font-weight: bold;">สถานะ / ขั้นตอนการดำเนินงาน</div>';
    let gridLinesHTML = '<div class="grid-line" style="grid-column: 1"></div>';

    // วาดหัววันที่
    for (let i = 0; i < totalDays; i++) {
      let d = new Date(startDate);
      d.setDate(d.getDate() + i);
      let dateStr = d.getDate() + ' ' + monthsThai[d.getMonth()];
      headerHTML += '<div class="date-cell">' + dateStr + '</div>';
      gridLinesHTML += '<div class="grid-line" style="grid-column: ' + (i + 2) + '"></div>';
    }
    document.getElementById('gantt-header').innerHTML = headerHTML;

    // คำนวณวันที่ปัจจุบัน (2 เม.ย. 2569 ตามที่คุณต้องการ)
    const today = new Date(2026, 3, 2); 
    today.setHours(0, 0, 0, 0); 
    const startForDiff = new Date(startDate);
    startForDiff.setHours(0, 0, 0, 0);
    const diffTime = today.getTime() - startForDiff.getTime();
    const todayIndex = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let bodyHTML = '';
    tasks.forEach(task => {
      const startCol = task.start + 2;
      const endCol = startCol + task.duration;

      let isBlinking = '';
      if (todayIndex >= task.start && todayIndex < (task.start + task.duration)) {
        isBlinking = 'blink';
      }

      const statusIcon = task.isDone ? '✓' : '✗';
      const statusClass = task.isDone ? 'status-done' : 'status-pending';
      const textClass = task.isDone ? 'text-done' : 'text-pending';

      bodyHTML += '<div class="task-row">';
      bodyHTML += '<div class="task-name-container">';
      bodyHTML += '<div class="status-box ' + statusClass + '">' + statusIcon + '</div>';
      bodyHTML += '<div class="task-name ' + textClass + '">' + task.name + '</div>';
      bodyHTML += '</div>';
      bodyHTML += '<div class="task-bar phase' + task.phase + ' ' + isBlinking + '" style="grid-column: ' + startCol + ' / ' + endCol + ';">' + task.duration + ' วัน</div>';
      bodyHTML += '</div>';
    });
    
    document.getElementById('task-container').innerHTML = bodyHTML;

    // วาดเส้นสีแดงวันนี้
    if (todayIndex >= 0 && todayIndex < totalDays) {
      const lineCol = todayIndex + 2;
      let displayDate = today.getDate() + ' ' + monthsThai[today.getMonth()] + ' ' + (today.getFullYear() + 543);
      gridLinesHTML += '<div class="today-line-container" style="grid-column: ' + lineCol + ';">';
      gridLinesHTML += '<div class="today-label">วันนี้ (' + displayDate + ')</div>';
      gridLinesHTML += '<div class="today-line"></div>';
      gridLinesHTML += '</div>';
    }
    document.getElementById('grid-lines').innerHTML = gridLinesHTML;
  }

  loadGanttData();

      document.getElementById('task-container').innerHTML = bodyHTML;

      if (todayIndex >= 0 && todayIndex < totalDays) {
        const lineCol = todayIndex + 2;
        let displayDate = today.getDate() + ' ' + monthsThai[today.getMonth()] + ' ' + (today.getFullYear() + 543);
        
        gridLinesHTML += '<div class="today-line-container" style="grid-column: ' + lineCol + ';">';
        gridLinesHTML += '<div class="today-label">วันนี้ (' + displayDate + ')</div>';
        gridLinesHTML += '<div class="today-line"></div>';
        gridLinesHTML += '</div>';
      }
      document.getElementById('grid-lines').innerHTML = gridLinesHTML;
    }

    loadGanttData();
  </script>
</body>
</html>
